<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Group of Institutions</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #ff6a00;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
}

/* Logo */
.logo img {
    height: 45px;
}

/* Menu */
nav {
    display: flex;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}

/* Menu Icon */
.menu-toggle {
    display: none;
    font-size: 26px;
    color: white;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    nav {
        position: absolute;
        top: 60px;
        right: 0;
        width: 220px;
        background: #ff6a00;

        display: none;
        flex-direction: column;
    }

    nav a {
        padding: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        margin: 0;
    }

    nav.show {
        display: flex;
    }
}

/* HERO */
.hero {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1588072432836-e10032774350');
    background-size: cover;
    color: white;
    padding: 100px 20px;
    text-align: center;
}

/* SECTIONS */
.section {
    padding: 50px 20px;
    text-align: center;
}

.section:nth-child(even) {
    background: #f5f5f5;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    width: 250px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* FOOTER */
.footer {
    background: #ff6a00;
    color: white;
    padding: 40px 20px;
}

.footer-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
}

.footer-box {
    width: 250px;
    margin: 10px;
}

.footer-bottom {
    text-align: center;
    margin-top: 20px;
}

/* FLOAT BUTTONS */
.whatsapp {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}

.call {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ff6a00;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="menu">
        <a href="#">Home</a>
        <a href="#">Admissions</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- HERO -->
<div class="hero">
    <h1>Admissions Open 2026</h1>
    <p>Start Your Career Today</p>
</div>

<!-- SECTION -->
<div class="section">
    <h2>Admissions</h2>
    <div class="cards">
        <div class="card">College Admissions</div>
        <div class="card">Open Schooling</div>
    </div>
</div>

<div class="section">
    <h2>About Us</h2>
    <p>We provide quality education and career guidance.</p>
</div>

<div class="section">
    <h2>Courses</h2>
    <div class="cards">
        <div class="card">Diploma</div>
        <div class="card">UG</div>
        <div class="card">PG</div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-container">
        <div class="footer-box">About Us</div>
        <div class="footer-box">Quick Links</div>
        <div class="footer-box">Programs</div>
        <div class="footer-box">Contact</div>
    </div>

    <div class="footer-bottom">
        © 2026 Classic Group of Institutions
    </div>
</div>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/919514550520" class="whatsapp">💬</a>
<a href="tel:9514550520" class="call">📞</a>

<!-- JS -->
<script>
function toggleMenu() {
    var menu = document.getElementById("menu");

    if (menu.classList.contains("show")) {
        menu.classList.remove("show");
    } else {
        menu.classList.add("show");
    }
}
</script>

</body>
</html>
